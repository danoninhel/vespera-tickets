version: "3.8"

services:
  postgres:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vespera
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    image: node:20
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /app
    user: root
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/vespera
    volumes:
      - .:/app
    entrypoint: ["sh", "-c"]
    command:
      - |
        npm install --silent prisma @prisma/client pg && 
        cat /app/prisma/migrations/0_init_supabase/migration.sql | psql $DATABASE_URL

volumes:
  postgres_data: